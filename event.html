<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>행사 상세 — 크래빗 아카데미</title>
<meta name="description" content="크래빗 아카데미의 웨비나·강의·행사 상세 정보" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  /* 포인트 폰트: 엘리스 디지털 배움체 (제목용, OFL — 라이선스: assets/fonts/EliceDigitalBaeum_License.pdf) */
  @font-face {
    font-family: "Elice Digital Baeum";
    src: url("assets/fonts/EliceDigitalBaeum-Bold.woff2") format("woff2");
    font-weight: 700;
    font-display: swap;
  }
  :root {
    --bg: #FFFFFF;
    --fill: #F2F3F6;
    --fill-soft: #F9FAFC;
    --ink: #16192A;
    --muted: rgba(22, 25, 42, 0.55);
    --line: #E8E8E8;
    --pink: #FB75BB;
    --tint: #FEE9F4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  header { box-shadow: 0 1px 4px rgba(22, 25, 42, 0.06); position: sticky; top: 0; background: rgba(255, 255, 255,0.92); backdrop-filter: blur(8px); z-index: 20; }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
  .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
  .brand img { height: 26px; display: block; }
  .brand a { color: inherit; text-decoration: none; }
  .brand .dot { color: var(--pink); }
  .nav > a { font-size: 15px; font-weight: 500; color: var(--muted); text-decoration: none; }
  .nav > a:hover { color: var(--ink); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--pink); outline-offset: 3px; border-radius: 2px; }

  /* main은 .wrap도 함께 쓰므로 .wrap의 padding:0 24px에 눌리지 않도록 특이도를 높인다 */
  main.wrap { padding-top: 56px; padding-bottom: 140px; }
  .thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    border-radius: 20px;
    box-shadow: 0 4px 16px rgba(22, 25, 42, 0.09);
    margin-bottom: 32px;
    background: var(--fill);
  }
  .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }
  /* 교육/설명회 — 상태 배지 왼쪽의 분류. 채운 배지들과 구분되게 외곽선만 */
  .badge.kind { color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }
  .badge.status-upcoming { background: var(--fill); color: var(--ink); }
  /* 당일 — 하루만 붙는 배지라 브랜드 핑크를 꽉 채워 가장 강하게 */
  .badge.status-today { background: var(--pink); color: #fff; }
  .badge.status-soon { background: var(--fill); color: var(--muted); }

  h1 {
    margin: 0 0 10px;
    font-size: clamp(28px, 4.5vw, 40px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.3;
    text-wrap: balance;
  }
  .date {
    font-size: 16px;
    color: var(--muted);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    margin-bottom: 28px;
  }
  .date a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .desc { font-size: 17.5px; color: var(--ink); margin: 0 0 28px; max-width: 40em; text-wrap: pretty; }

  .speaker { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin: 0 0 10px; }
  .speaker:last-of-type { margin-bottom: 28px; }
  .speaker .s-label {
    flex: none;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--pink);
    text-transform: uppercase;
  }
  /* 스페셜 조교는 연사보다 한 단계 낮은 정보라 라벨을 회색으로 */
  .speaker.assist .s-label { color: var(--muted); letter-spacing: 0; }
  .speaker strong { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .speaker .s-role { font-size: 15px; color: var(--muted); }

  /* 섹션 제목 — 홈과 같이 엘리스 배움체로, 본문보다 확실히 크게.
     콜아웃 안의 준비물·추천 대상(h3)도 '이런 내용을 다뤄요'와 같은 급으로 맞춘다. */
  .sec-h, .points h2, .points h3, .materials h2 {
    font-family: "Elice Digital Baeum", "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif;
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .points {
    background: var(--fill-soft);
    border-radius: 16px;
    padding: 30px 34px;
    margin-bottom: 36px;
    box-shadow: 0 1px 4px rgba(22, 25, 42, 0.05);
  }
  .points h2 { margin: 0 0 18px; }
  .points ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 11px; }
  .points li { display: flex; gap: 12px; font-size: 17px; align-items: baseline; }
  .points li::before {
    content: "";
    flex: none;
    width: 7px; height: 7px;
    border-radius: 99px;
    background: var(--pink);
    transform: translateY(-2px);
  }
  /* 준비물·추천 대상 — 같은 콜아웃 안에서 구분선으로만 나눈다.
     제목·본문 모두 '이런 내용을 다뤄요'와 동일한 규격을 쓴다. */
  .p-extra { margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--line); }
  .points h3 { margin: 0 0 18px; }

  /* ---------- 커리큘럼 (세션별 안내) ----------
     포스터를 왼쪽에 두고 오른쪽에 설명을 세우는 가로형. 좁은 화면에서는 위아래로 쌓는다. */
  .sec-h { margin: 0 0 16px; }
  .sessions { margin: 0 0 36px; }
  .s-grid { display: flex; flex-direction: column; gap: 16px; }
  .s-card {
    background: var(--fill-soft);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }
  .s-card img {
    flex: none;
    width: 270px;
    display: block;
    aspect-ratio: 1190 / 1684;
    object-fit: cover;
    background: var(--fill);
  }
  .s-body { flex: 1; min-width: 0; padding: 28px 30px; display: flex; flex-direction: column; justify-content: center; }
  .s-no { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; color: var(--pink); }
  .s-title { font-size: 23px; font-weight: 700; margin: 8px 0 18px; letter-spacing: -0.01em; line-height: 1.35; text-wrap: pretty; }
  .s-who { font-size: 18px; font-weight: 700; margin: 0; }
  .s-who span { display: block; margin-top: 5px; font-size: 15.5px; font-weight: 400; color: var(--muted); line-height: 1.55; }
  /* 본문 항목은 '이런 내용을 다뤄요'의 불릿과 같은 크기·굵기 */
  .s-pts { margin: 18px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .s-pts li { font-size: 17px; color: var(--muted); display: flex; gap: 11px; align-items: baseline; }
  .s-pts li::before {
    content: "";
    flex: none;
    width: 5px; height: 5px;
    border-radius: 99px;
    background: rgba(22, 25, 42, 0.3);
    transform: translateY(-2px);
  }
  @media (max-width: 640px) {
    .s-card { flex-direction: column; }
    .s-card img { width: 100%; }
    .s-body { padding: 22px 24px 26px; }
  }

  /* ---------- 제공 자료 (다크 섹션) ---------- */
  .materials { background: var(--ink); border-radius: 18px; padding: 34px 34px 36px; margin-bottom: 36px; }
  .materials h2 { margin: 0 0 6px; color: #fff; }
  .materials .m-sub { margin: 0 0 22px; font-size: 15.5px; color: rgba(255, 255, 255, 0.55); }
  .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 600px) { .m-grid { grid-template-columns: 1fr; } }
  .m-item {
    display: flex;
    gap: 14px;
    align-items: baseline;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .m-num { flex: none; font-size: 13.5px; font-weight: 700; color: var(--pink); font-variant-numeric: tabular-nums; }
  .m-name { font-size: 16.5px; font-weight: 600; color: #fff; line-height: 1.45; }
  .m-note { display: block; margin-top: 5px; font-size: 14px; font-weight: 400; color: rgba(255, 255, 255, 0.55); }

  /* ---------- 카드뉴스 상세 ---------- */
  .detail { margin: 0 0 36px; }
  .detail-strip {
    max-width: 600px;
    margin: 0 auto;
    border-radius: 16px;
    overflow: hidden;
  }
  /* 흰 배경 카드뉴스를 여백 없이 이어 붙여 한 장의 상세페이지처럼 보이게 한다 */
  .detail-strip img { width: 100%; display: block; margin: 0; }

  /* 신청 버튼 옆 담당자 문의 */
  .contact-note { font-size: 14.5px; color: var(--muted); font-weight: 500; }
  .contact-note a { color: var(--ink); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }

  /* ---------- 하단 고정 신청 바 ----------
     실행 가능한 CTA(신청·문의·다시보기)가 있을 때만 렌더된다.
     '다시보기 준비 중'처럼 누를 게 없는 상태는 본문에 문구로만 남긴다. */
  .apply-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 30;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    padding: 14px 0 calc(14px + env(safe-area-inset-bottom, 0px));
  }
  .apply-bar .bar-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .apply-bar .btn {
    display: block;
    width: 100%;
    text-align: center;
    padding: 18px 28px;
    font-size: 17px;
    border-radius: 14px;
  }
  .apply-bar .contact-note { font-size: 14px; }
  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: #333333; }
  .soon-note { font-size: 15px; color: var(--muted); font-weight: 500; }
  .closed-note {
    margin-top: 20px;
    background: var(--tint);
    border-radius: 16px;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: flex-start;
  }
  .closed-note[hidden] { display: none; }
  .closed-note p { margin: 0; font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.6; }

  .notfound { text-align: center; padding: 80px 0; }
  .notfound h1 { margin-bottom: 12px; }
  .notfound p { color: var(--muted); margin: 0 0 28px; }

  footer {
    background: var(--fill);
    border-top: 1px solid var(--line);
    padding: 40px 0 44px;
    font-size: 14px;
    color: var(--muted);
  }
  .f-top { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  .f-brand img { height: 22px; display: block; }
  .f-brand .dot { color: var(--pink); }
  .f-sns { display: flex; gap: 18px; }
  .f-sns a { color: var(--muted); text-decoration: none; font-weight: 500; }
  .f-sns a:hover { color: var(--ink); }
  .f-info { line-height: 1.8; }
  .f-info p { margin: 0; }
  .f-bottom { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="brand"><a href="./"><img src="assets/logo.png" alt="Crabit 아카데미" /></a></div>
    <a href="./">홈으로 돌아가기</a>
  </div>
</header>

<main class="wrap" id="main"></main>

<footer>
  <div class="wrap">
    <div class="f-top">
      <div class="f-brand"><img src="assets/logo.png" alt="Crabit 아카데미" /></div>
      <div class="f-sns">
        <a href="https://www.instagram.com/crabit_official" target="_blank" rel="noopener">인스타그램</a>
        <a href="https://pf.kakao.com/_nutkG" target="_blank" rel="noopener">카카오톡 채널</a>
        <a href="mailto:craftyourhabit@gmail.com">이메일</a>
      </div>
    </div>
    <div class="f-info">
      <p>(주)크래빗 · 대표 김현지</p>
      <p>사업자등록번호 747-86-03279 · 통신판매업신고 제 2025-서울구로-2011</p>
      <p>서울시 구로구 디지털로 288, 2003-1호 · 문의 010-5957-2483</p>
    </div>
    <div class="f-bottom">
      <span>&copy; 2026 CRABIT. All rights reserved.</span>
      <span>올커니(올바른 교육 커뮤니티)와 함께합니다</span>
    </div>
  </div>
</footer>

<script src="assets/events.js"></script>
<script>
(function () {
  const id = new URLSearchParams(location.search).get("id");
  const ev = id && EVENTS_DB[id];
  const main = document.getElementById("main");

  if (!ev) {
    main.innerHTML = '<div class="notfound">'
      + '<h1>행사를 찾을 수 없어요</h1>'
      + '<p>주소가 잘못되었거나, 종료되어 내려간 행사일 수 있습니다.</p>'
      + '<a class="btn btn-primary" href="./">홈으로 돌아가기</a>'
      + '</div>';
    return;
  }

  document.title = ev.title + " — 크래빗 아카데미";

  const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

  const BADGE_CLS = { today: "status-today", upcoming: "status-upcoming", closed: "status-soon" };
  let statusBadge;
  if (ev.status === "replay") {
    statusBadge = "";
  } else if (ev.status === "replay-soon") {
    statusBadge = '<span class="badge status-soon">다시보기 준비 중</span>';
  } else {
    const t = eventStatusTag(ev);
    statusBadge = '<span class="badge ' + BADGE_CLS[t.cls] + '">' + t.text + '</span>';
  }

  const kindBadge = ev.kind ? '<span class="badge kind">' + esc(ev.kind) + '</span>' : '';

  // ctaAction: 누를 수 있는 CTA가 있으면 하단 고정 바로, 없으면 본문에 문구로만 남긴다
  let cta = "", ctaAction = true, isClosedFlow = false;
  if (ev.status === "replay" && ev.replayUrl) {
    cta = '<a class="btn btn-primary" href="' + ev.replayUrl + '" target="_blank" rel="noopener">다시보기</a>';
  } else if (ev.status === "replay-soon" || ev.status === "replay") {
    ctaAction = false;
  } else if (!isEventOver(ev)) {
    cta = ev.applyUrl
      ? '<a class="btn btn-primary" href="' + ev.applyUrl + '" target="_blank" rel="noopener">신청하기</a>'
      : '<a class="btn btn-primary" href="mailto:hyunji@crabit.co.kr?subject=' + encodeURIComponent("[참가 문의] " + ev.title) + '">참가 문의하기</a>';
  } else {
    // 마감됐거나, 날짜가 지났는데 status를 아직 안 바꾼 경우
    cta = '<button class="btn btn-primary" id="closedApply" type="button">신청하기</button>';
    isClosedFlow = true;
  }

  const sessionsHtml = ev.sessions
    ? '<section class="sessions"><h2 class="sec-h">커리큘럼</h2><div class="s-grid">'
      + ev.sessions.map(s =>
          '<article class="s-card">'
          + (s.poster ? '<img src="' + s.poster + '" alt="' + esc("SESSION " + s.no + " " + s.title + " — " + s.speaker) + '" loading="lazy" />' : '')
          + '<div class="s-body">'
          + '<div class="s-no">SESSION ' + esc(s.no) + '</div>'
          + '<h3 class="s-title">' + esc(s.title) + '</h3>'
          + '<p class="s-who">' + esc(s.speaker)
          + (s.speakerRole ? '<span>' + esc(s.speakerRole) + '</span>' : '')
          + '</p>'
          + (s.points ? '<ul class="s-pts">' + s.points.map(p => '<li>' + esc(p) + '</li>').join("") + '</ul>' : '')
          + '</div></article>'
        ).join("")
      + '</div></section>'
    : '';

  const materialsHtml = ev.materials
    ? '<section class="materials">'
      + '<h2>제공 자료 ' + ev.materials.length + '종</h2>'
      + '<p class="m-sub">수강생 전원에게 실무에 바로 쓰는 운영자료를 드려요.</p>'
      + '<div class="m-grid">'
      + ev.materials.map((m, i) =>
          '<div class="m-item"><span class="m-num">' + String(i + 1).padStart(2, "0") + '</span>'
          + '<span class="m-name">' + esc(m.name)
          + (m.note ? '<span class="m-note">' + esc(m.note) + '</span>' : '')
          + '</span></div>'
        ).join("")
      + '</div></section>'
    : '';

  const detailHtml = ev.detailImages
    ? '<section class="detail"><div class="detail-strip">'
      + ev.detailImages.map(d => '<img src="' + d.src + '" alt="' + esc(d.alt) + '" loading="lazy" />').join("")
      + '</div></section>'
    : '';

  // 연사와 스페셜 조교
  const speakerHtml = (ev.speaker
      ? '<p class="speaker"><span class="s-label">Speaker</span><strong>' + esc(ev.speaker) + '</strong>'
        + (ev.speakerRole ? '<span class="s-role">' + esc(ev.speakerRole) + '</span>' : '')
        + '</p>'
      : '')
    + (ev.assistant
        ? '<p class="speaker assist"><span class="s-label">스페셜 조교</span><strong>' + esc(ev.assistant) + '</strong></p>'
        : '');

  // 준비물·추천 대상은 '이런 내용을 다뤄요' 콜아웃 안에 같은 규격(제목+핑크 불릿)으로 담는다
  const extraHtml =
      (ev.prep
        ? '<div class="p-extra"><h3>준비물</h3><ul>'
          + ev.prep.map(p => "<li>" + esc(p) + "</li>").join("")
          + '</ul></div>'
        : '')
    + (ev.audience
        ? '<div class="p-extra"><h3>추천 대상</h3><ul><li>' + esc(ev.audience) + '</li></ul></div>'
        : '');

  // 주최사 담당자가 따로 있으면 신청 버튼 옆에 문의처를 함께 안내한다
  const contactHtml = (ev.contact && ev.status === "upcoming")
    ? '<span class="contact-note">문의 ' + esc(ev.contact.name) + ' '
      + '<a href="tel:' + esc(ev.contact.tel.replace(/-/g, "")) + '">' + esc(ev.contact.tel) + '</a></span>'
    : '';

  main.innerHTML =
    '<img class="thumb" src="' + ev.thumb + '" alt="' + esc(ev.title) + ' 썸네일" />'
    + '<div class="meta-row">'
    + kindBadge
    + statusBadge
    + '</div>'
    + '<h1>' + esc(ev.title) + '</h1>'
    + '<div class="date">' + esc(ev.date)
    + (ev.place ? '<br />' + esc(ev.place) : '')
    + (ev.placeUrl ? ' &nbsp;·&nbsp; <a href="' + ev.placeUrl + '" target="_blank" rel="noopener">위치 보기</a>' : '')
    + '</div>'
    + '<p class="desc">' + esc(ev.desc) + '</p>'
    + speakerHtml
    + '<div class="points"><h2>이런 내용을 다뤄요</h2><ul>'
    + ev.points.map(p => "<li>" + esc(p) + "</li>").join("")
    + '</ul>' + extraHtml + '</div>'
    + sessionsHtml
    + materialsHtml
    + detailHtml
    + (ctaAction ? '' : '<p class="soon-note">다시보기 영상을 준비하고 있어요.</p>')
    + (isClosedFlow
        ? '<div class="closed-note" id="closedNote" hidden>'
          + '<p>이미 지난 교육이에요.<br />크래빗 아카데미에서 제공하는 다른 교육 일정을 둘러보세요!</p>'
          + '<a class="btn btn-primary" href="schedule">다른 교육 일정 보기</a>'
          + '</div>'
        : '');

  if (ctaAction) {
    const bar = document.createElement("div");
    bar.className = "apply-bar";
    bar.innerHTML = '<div class="wrap bar-inner">' + cta + contactHtml + '</div>';
    document.body.appendChild(bar);
    // 고정 바가 푸터를 가리지 않도록 바 높이만큼 본문 아래 여백을 확보한다
    const padForBar = () => { document.body.style.paddingBottom = bar.offsetHeight + "px"; };
    padForBar();
    window.addEventListener("resize", padForBar);
  }

  const closedBtn = document.getElementById("closedApply");
  if (closedBtn) {
    closedBtn.addEventListener("click", () => {
      const note = document.getElementById("closedNote");
      note.hidden = false;
      closedBtn.style.display = "none";
      note.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  }
})();
</script>

</body>
</html>
