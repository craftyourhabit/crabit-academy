<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#16192A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="820" height="440" rx="18" fill="#EEF0F4"/>

  <!-- 작업표시줄 -->
  <rect x="0" y="398" width="820" height="42" fill="#14161F"/>
  <rect x="0" y="398" width="820" height="2" fill="#000" opacity="0.25"/>
  <!-- 시작 버튼 (윈도우 로고, 브랜드 핑크) -->
  <g transform="translate(26,410)">
    <rect x="0" y="0" width="8" height="8" rx="1.5" fill="#FB75BB"/>
    <rect x="10" y="0" width="8" height="8" rx="1.5" fill="#FB75BB"/>
    <rect x="0" y="10" width="8" height="8" rx="1.5" fill="#FB75BB"/>
    <rect x="10" y="10" width="8" height="8" rx="1.5" fill="#FB75BB"/>
  </g>
  <!-- 검색 pill -->
  <rect x="66" y="406" width="240" height="26" rx="13" fill="#2A2D3A"/>
  <circle cx="84" cy="419" r="6" fill="none" stroke="#AeB2C0" stroke-width="2"/>
  <line x1="88.5" y1="423.5" x2="93" y2="428" stroke="#AEB2C0" stroke-width="2" stroke-linecap="round"/>
  <text x="104" y="424" font-size="14" fill="#E7E9F2" font-weight="600">PowerShell</text>

  <!-- 검색 결과 팝업 -->
  <rect x="56" y="150" width="300" height="238" rx="14" fill="#FFFFFF" stroke="#E3E4EA" filter="url(#sh)"/>
  <text x="76" y="182" font-size="13" fill="#8A8C98" font-weight="600" letter-spacing="0.02em">가장 정확한 항목</text>
  <!-- 결과 타일 (선택됨) -->
  <rect x="70" y="196" width="272" height="58" rx="10" fill="#FCEAF4" stroke="#F6C7E1"/>
  <rect x="84" y="211" width="30" height="30" rx="7" fill="#16192A"/>
  <text x="99" y="231" font-size="15" fill="#6ED6A6" font-family="monospace" text-anchor="middle" font-weight="700">&gt;_</text>
  <text x="128" y="221" font-size="15.5" fill="#16192A" font-weight="700">Windows PowerShell</text>
  <text x="128" y="240" font-size="12.5" fill="#8A8C98">앱</text>

  <!-- 우클릭 안내 배지 -->
  <g transform="translate(70,104)">
    <rect x="0" y="0" width="228" height="34" rx="17" fill="#FB75BB"/>
    <text x="46" y="22" font-size="15" fill="#FFFFFF" font-weight="700">여기서 마우스 오른쪽 클릭!</text>
    <!-- 마우스 아이콘 (오른쪽 버튼 강조) -->
    <g transform="translate(16,7)">
      <rect x="0" y="0" width="18" height="22" rx="9" fill="#fff"/>
      <path d="M9 0 h4 a5 5 0 0 1 5 5 v5 h-9 z" fill="#16192A"/>
      <line x1="9" y1="1" x2="9" y2="9" stroke="#16192A" stroke-width="1"/>
    </g>
    <path d="M40 34 L34 46 L52 34 Z" fill="#FB75BB"/>
  </g>

  <!-- 우클릭 컨텍스트 메뉴 -->
  <rect x="300" y="212" width="252" height="196" rx="12" fill="#FFFFFF" stroke="#E3E4EA" filter="url(#sh)"/>
  <text x="322" y="245" font-size="14.5" fill="#16192A">열기</text>
  <!-- 관리자 권한으로 실행 (하이라이트) -->
  <rect x="308" y="258" width="236" height="34" rx="8" fill="#FCEAF4"/>
  <text x="322" y="280" font-size="14.5" fill="#D63C93" font-weight="700">관리자 권한으로 실행</text>
  <text x="322" y="315" font-size="14.5" fill="#16192A">파일 위치 열기</text>
  <text x="322" y="345" font-size="14.5" fill="#16192A">시작 화면에 고정</text>
  <text x="322" y="375" font-size="14.5" fill="#16192A">작업 표시줄에 고정</text>

  <!-- 커서 화살표 (관리자 권한으로 실행 위) -->
  <g transform="translate(470,268)">
    <path d="M0 0 L0 20 L5 15 L9 23 L12 21 L8 14 L15 14 Z" fill="#16192A" stroke="#fff" stroke-width="1.2"/>
  </g>
</svg>
