<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>교육 / 설명회 — 크래빗 아카데미</title>
<meta name="description" content="크래빗과 올커니가 진행하는 교육과 설명회 전체 목록." />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  /* 포인트 폰트: 엘리스 디지털 배움체 (제목용, OFL — 라이선스: assets/fonts/EliceDigitalBaeum_License.pdf) */
  @font-face {
    font-family: "Elice Digital Baeum";
    src: url("assets/fonts/EliceDigitalBaeum-Bold.woff2") format("woff2");
    font-weight: 700;
    font-display: swap;
  }
  .page-head h1 { font-family: "Elice Digital Baeum", "Pretendard Variable", Pretendard, -apple-system, "Apple SD Gothic Neo", sans-serif; }
  :root {
    --page: #F2F3F6;
    --bg: #FFFFFF;
    --fill: #F2F3F6;
    --fill-soft: #F9FAFC;
    --ink: #16192A;
    --muted: rgba(22, 25, 42, 0.55);
    --line: #E8E8E8;
    --pink: #FB75BB;
    --tint: #FEE9F4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 0 24px; }

  header {
    background: rgba(244, 246, 248, 0.92);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
  .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
  .brand img { height: 26px; display: block; }
  .brand a { color: inherit; text-decoration: none; }
  .brand .dot { color: var(--pink); }
  .nav > a { font-size: 15px; font-weight: 500; color: var(--muted); text-decoration: none; }
  .nav > a:hover { color: var(--ink); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--pink); outline-offset: 3px; border-radius: 2px; }

  .page-head { padding: 36px 0 24px; }
  .page-head h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .page-head p { margin: 0; font-size: 16px; color: var(--muted); }

  .panel {
    background: var(--bg);
    border-radius: 24px;
    padding: 12px 40px 24px;
    box-shadow: 0 1px 4px rgba(22, 25, 42, 0.05);
    margin-bottom: 56px;
  }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 20px 0 8px; }
  .tab {
    border: 0;
    background: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    color: var(--muted);
    padding: 10px 16px;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--fill); color: var(--ink); }

  .rows { display: flex; flex-direction: column; }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    padding: 36px 0;
    text-decoration: none;
    color: inherit;
    border: 0;
    background: none;
    font-family: inherit;
    text-align: left;
    width: 100%;
    cursor: pointer;
  }
  .row.static { cursor: default; }
  .row .info { flex: 1; min-width: 0; }
  .badges { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .pill {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    background: var(--tint);
    color: var(--pink);
  }
  .pill.gray { background: var(--fill); color: var(--muted); }
  .pill.ink { background: var(--ink); color: #fff; }
  .cat { font-size: 14px; color: var(--muted); font-weight: 500; }
  .row h2 {
    margin: 0 0 12px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.4;
    transition: color 0.15s;
  }
  .row:not(.static):hover h2 { color: var(--pink); }
  .row .sub { font-size: 15px; color: var(--muted); }
  .row .thumb {
    flex: none;
    width: 240px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 16px;
    background: var(--fill);
    box-shadow: 0 2px 8px rgba(22, 25, 42, 0.08);
    display: block;
  }
  .empty { padding: 48px 0; text-align: center; color: var(--muted); font-size: 16px; }

  footer {
    border-top: 1px solid var(--line);
    padding: 40px 0 44px;
    font-size: 14px;
    color: var(--muted);
  }
  .f-top { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  .f-brand img { height: 22px; display: block; }
  .f-brand .dot { color: var(--pink); }
  .f-sns { display: flex; gap: 18px; }
  .f-sns a { color: var(--muted); text-decoration: none; font-weight: 500; }
  .f-sns a:hover { color: var(--ink); }
  .f-info { line-height: 1.8; }
  .f-info p { margin: 0; }
  .f-bottom { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }

  /* 교육/설명회 — 상태 알약 왼쪽의 분류. 채운 알약과 구분되게 외곽선만 */
  .pill.line { background: none; color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }
  /* 당일 — 하루만 붙는 알약이라 브랜드 핑크를 꽉 채워 가장 강하게 */
  .pill.today { background: var(--pink); color: #fff; }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="brand"><a href="./"><img src="assets/logo.png" alt="Crabit 아카데미" /></a></div>
    <a href="./">홈으로 돌아가기</a>
  </div>
</header>

<main class="wrap">
  <div class="page-head">
    <h1>교육 / 설명회</h1>
    <p>크래빗과 올커니가 진행하는 교육과 설명회를 모았어요.</p>
  </div>
  <div class="panel">
    <div class="tabs" id="tabs" role="tablist"></div>

<footer>
  <div class="wrap">
    <div class="f-top">
      <div class="f-brand"><img src="assets/logo.png" alt="Crabit 아카데미" /></div>
      <div class="f-sns">
        <a href="https://www.instagram.com/crabit_official" target="_blank" rel="noopener">인스타그램</a>
        <a href="https://pf.kakao.com/_nutkG" target="_blank" rel="noopener">카카오톡 채널</a>
        <a href="mailto:craftyourhabit@gmail.com">이메일</a>
      </div>
    </div>
    <div class="f-info">
      <p>(주)크래빗 · 대표 김현지</p>
      <p>사업자등록번호 747-86-03279 · 통신판매업신고 제 2025-서울구로-2011</p>
      <p>서울시 구로구 디지털로 288, 2003-1호 · 문의 010-5957-2483</p>
    </div>
    <div class="f-bottom">
      <span>&copy; 2026 CRABIT. All rights reserved.</span>
      <span>올커니(올바른 교육 커뮤니티)와 함께합니다</span>

<script src="assets/events.js"></script>
<script>
/* ---------- 교육 / 설명회 전체 목록 ----------
   EVENTS_DB 전체를 kind(교육·설명회)로 걸러 보여줍니다.
   진행 예정이 위, 지난 일정이 아래. 상태 판단은 events.js의 공통 기준을 씁니다. */
(function () {
  const CATEGORIES = ["전체", "교육", "설명회"];
  const EMPTY_MSG = {
    "전체": "일정을 준비하고 있어요.",
    "교육": "교육을 준비하고 있어요.",
    "설명회": "설명회를 준비하고 있어요."
  };
  let active = "전체";

  const tabsEl = document.getElementById("tabs");
  const rowsEl = document.getElementById("rows");

  function subLine(ev) {
    return ev.place ? ev.date + " · " + ev.place : ev.date;
  }

  function badges(ev) {
    const t = eventStatusTag(ev);
    const cls = t.cls === "today" ? "pill today" : (t.cls === "upcoming" ? "pill" : "pill gray");
    return (ev.kind ? '<span class="pill line">' + ev.kind + "</span>" : "")
      + '<span class="' + cls + '">' + t.text + "</span>";
  }

  /* 예정을 먼저, 그 안에서는 가까운 날짜순. 지난 일정은 최근에 열린 것부터. */
  function sortEntries(entries) {
    return entries.sort((a, b) => {
      const oa = isEventOver(a[1]), ob = isEventOver(b[1]);
      if (oa !== ob) return oa ? 1 : -1;
      const da = a[1].startDate || "", db = b[1].startDate || "";
      if (!da || !db) return !da && !db ? 0 : (da ? -1 : 1);  // 날짜 미정은 뒤로
      return oa ? db.localeCompare(da) : da.localeCompare(db);
    });
  }

  function renderTabs() {
    tabsEl.innerHTML = "";
    CATEGORIES.forEach(c => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "tab" + (c === active ? " active" : "");
      b.textContent = c;
      b.setAttribute("role", "tab");
      b.setAttribute("aria-selected", c === active ? "true" : "false");
      b.addEventListener("click", () => { active = c; renderTabs(); renderRows(); });
      tabsEl.appendChild(b);
    });
  }

  function renderRows() {
    const entries = sortEntries(
      Object.entries(EVENTS_DB).filter(([, ev]) => active === "전체" || ev.kind === active)
    );
    rowsEl.innerHTML = "";
    if (entries.length === 0) {
      rowsEl.innerHTML = '<div class="empty">' + EMPTY_MSG[active] + "</div>";
      return;
    }
    entries.forEach(([id, ev]) => {
      const a = document.createElement("a");
      a.className = "row";
      a.href = "event?id=" + id;
      a.innerHTML =
        '<div class="info">'
        + '<div class="badges">' + badges(ev) + '<span class="cat"></span></div>'
        + "<h2></h2>"
        + '<div class="sub"></div>'
        + "</div>"
        + '<img class="thumb" src="' + ev.thumb + '" alt="" loading="lazy" />';
      a.querySelector(".cat").textContent = ev.host;
      a.querySelector("h2").textContent = ev.title;
      a.querySelector(".sub").textContent = subLine(ev);
      rowsEl.appendChild(a);
    });
  }

  renderTabs();
  renderRows();
})();
</script>

</body>
</html>
